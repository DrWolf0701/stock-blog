<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 小熊投資運勢</title>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; }
        .input-group { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(240,147,251,0.4); }
        #result { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 15px; display: none; }
        .stars { font-size: 40px; text-align: center; }
        .lucky { display: flex; justify-content: space-around; margin: 20px 0; flex-wrap: wrap; }
        .lucky-item { text-align: center; margin: 10px; }
        .lucky-item .label { font-size: 14px; color: #666; }
        .lucky-item .value { font-size: 20px; font-weight: bold; color: #f5576c; }
        .market, .advice { padding: 15px; border-radius: 10px; margin: 15px 0; }
        .market { background: #e8f4f8; }
        .advice { background: #fff3cd; }
        .quote { text-align: center; color: #666; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 小熊投資運勢</h1>
        <div class="input-group">
            <label>你的名字</label>
            <input type="text" id="name" placeholder="輸入你的名字" value="投資人">
        </div>
        <div class="input-group">
            <label>生日</label>
            <input type="date" id="birthday" value="2000-01-01">
        </div>
        <button onclick="getFortune()">🔮 開始占卜</button>
        
        <div id="result">
            <div class="stars" id="stars"></div>
            <div class="lucky">
                <div class="lucky-item"><div class="label">💰 幸運股票</div><div class="value" id="stock"></div></div>
                <div class="lucky-item"><div class="label">🎯 幸運數字</div><div class="value" id="numbers"></div></div>
                <div class="lucky-item"><div class="label">🏭 幸運板塊</div><div class="value" id="sector"></div></div>
            </div>
            <div class="market">
                <h3>📈 市場數據</h3>
                <p>S&P 500 趨勢：<strong id="trend"></strong></p>
                <p>RSI：<strong id="rsi"></strong></p>
                <p>VIX 恐慌指數：<strong id="vix"></strong></p>
            </div>
            <div class="advice">
                <h3>💡 建議</h3>
                <p id="advice"></p>
            </div>
            <div class="quote" id="quote"></div>
        </div>
    </div>

    <script>
        const stocks = ['AAPL', 'NVDA', 'GOOGL', 'MSFT', 'AMZN', 'META', 'TSLA', 'BRK-B', 'AMD', 'INTC'];
        const sectors = ['科技', '金融', '能源', '醫療', '消費'];
        const quotes = ['股市有風險，占卜僅供參考！', '運勢好也要做好風險管理！', '學習是最好的投資！', '保持耐心，等待機會！'];
        
        function getFortune() {
            const name = document.getElementById('name').value || '投資人';
            const birthday = document.getElementById('birthday').value;
            
            const seed = birthday ? new Date(birthday).getTime() : Date.now();
            const luckyNumbers = [];
            const used = new Set();
            while(luckyNumbers.length < 3) {
                const n = Math.floor(Math.random() * 99) + 1;
                if(!used.has(n)) { used.add(n); luckyNumbers.push(n); }
            }
            luckyNumbers.sort((a,b) => a-b);
            
            const stock = stocks[Math.floor(Math.random() * stocks.length)];
            const sector = sectors[Math.floor(Math.random() * sectors.length)];
            const stars = Math.floor(Math.random() * 3) + 3;
            
            const trends = ['多頭', '空頭', '震盪'];
            const trend = trends[Math.floor(Math.random() * trends.length)];
            const rsi = (30 + Math.random() * 40).toFixed(1);
            const vix = (12 + Math.random() * 15).toFixed(1);
            
            let advice = '';
            if (rsi > 70) advice = '市場過熱 - 今日宜：分批賣出';
            else if (rsi < 30) advice = '超跌反彈有望 - 今日宜：分批買入';
            else if (trend === '多頭') advice = '多頭趨勢持續 - 今日宜：持股待漲';
            else if (trend === '空頭') advice = '空頭趨勢延續 - 今日宜：觀望為主';
            else advice = '市場震盪整理 - 今日宜：區間操作';
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('stars').innerHTML = '⭐'.repeat(stars) + '☆'.repeat(5-stars);
            document.getElementById('stock').textContent = stock;
            document.getElementById('numbers').textContent = luckyNumbers.join(', ');
            document.getElementById('sector').textContent = sector;
            document.getElementById('trend').textContent = trend;
            document.getElementById('rsi').textContent = rsi;
            document.getElementById('vix').textContent = vix;
            document.getElementById('advice').textContent = advice;
            document.getElementById('quote').textContent = '🐻 ' + quotes[Math.floor(Math.random() * quotes.length)];
        }
    </script>
</body>
</html>
